apiVersion: apps/v1
kind: Deployment

metadata:
  name: demoapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: demoapp

  template:
    metadata:
      labels:
        app: demoapp

    spec:
      containers:
      - name: demoapp
        image: priyushinde/demoapp
        ports:
        - containerPort: 8080